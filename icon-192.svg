*{box-sizing:border-box;margin:0;padding:0}:root{--primary:#4f46e5;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--neutral-50:#f8fafc;--neutral-100:#f1f5f9;--neutral-200:#e2e8f0;--neutral-300:#cbd5e1;--neutral-400:#94a3b8;--neutral-600:#475569;--neutral-800:#1e293b;--neutral-900:#0f172a}body{background-color:var(--neutral-50);color:var(--neutral-900);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;line-height:1.6}#root{width:100%;min-height:100vh}.container{max-width:1200px;margin:0 auto;padding:0 .5rem}.header{background:var(--primary);color:#fff;padding:.75rem 0;box-shadow:0 2px 8px #0000001a}.header h1{font-size:1.125rem;font-weight:700}.header p{opacity:.9;margin-top:.1rem;font-size:.75rem}.install-banner{color:#fff;text-align:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:8px;margin:1rem 0;padding:1rem;box-shadow:0 2px 8px #0003}.install-banner p{align-items:center;gap:.5rem;margin-bottom:.75rem;font-size:.9rem;display:inline-flex}.install-btn{color:#667eea;cursor:pointer;background:#fff;border:none;border-radius:6px;padding:.6rem 1.5rem;font-weight:700}.setup-screen{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);justify-content:center;align-items:center;min-height:100vh;padding:1rem;display:flex}.setup-card{background:#fff;border-radius:12px;width:100%;max-width:400px;padding:2rem;box-shadow:0 10px 40px #0003}.setup-card h1{color:var(--primary);margin-bottom:.5rem;font-size:1.5rem}.setup-card p{color:var(--neutral-600);margin-bottom:2rem;font-size:.9rem}.form-group{margin-bottom:1.5rem}.form-group label{color:var(--neutral-800);margin-bottom:.5rem;font-size:.9rem;font-weight:700;display:block}.form-group input,.status-dropdown,.custom-response input,.notes-area textarea{border:2px solid var(--neutral-200);border-radius:8px;width:100%;padding:.75rem;font-family:inherit;font-size:1rem}.form-group input:focus,.status-dropdown:focus,.custom-response input:focus,.notes-area textarea:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px #4f46e51a}.setup-btn{color:#fff;cursor:pointer;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border:none;border-radius:8px;width:100%;padding:.875rem;font-size:1rem;font-weight:700}.upload-zone{border:2px dashed var(--primary);text-align:center;background-color:var(--neutral-100);cursor:pointer;border-radius:8px;margin:1rem 0;padding:1.5rem 1rem}.upload-zone.dragover{background-color:#e0e7ff;border-color:#3730a3}.upload-zone input{display:none}.upload-icon{color:var(--primary);justify-content:center;margin-bottom:.75rem;display:flex}.upload-zone h2{margin-bottom:.25rem;font-size:1.125rem}.upload-zone p{color:var(--neutral-600);font-size:.8rem}.help-text{align-items:center;gap:.3rem;margin-top:.5rem;display:inline-flex}.progress-container,.teleprompter,.tracking-panel{background:#fff;border-radius:8px;padding:.75rem;box-shadow:0 1px 3px #0000001a}.progress-container{margin:.75rem 0}.progress-info{color:var(--neutral-600);justify-content:space-between;margin-bottom:.5rem;font-size:.8rem;display:flex}.progress-bar{background-color:var(--neutral-200);border-radius:3px;width:100%;height:6px;overflow:hidden}.progress-fill{background-color:var(--primary);height:100%}.main-layout{grid-template-columns:1fr;gap:1rem;margin:1rem 0;display:grid}.teleprompter{text-align:center}.teleprompter-content{margin-bottom:.75rem;font-size:1.25rem;line-height:1.4}.name-highlight{color:var(--primary);font-weight:700}.contact-info{background-color:var(--neutral-100);border-radius:6px;margin:.75rem 0;padding:.75rem}.contact-info p{color:var(--neutral-600);margin:.25rem 0;font-size:.875rem}.call-button{background-color:var(--success);color:#fff;cursor:pointer;border:none;border-radius:6px;align-items:center;gap:.4rem;margin:.5rem;padding:.75rem 1.5rem;font-size:1rem;font-weight:700;text-decoration:none;display:inline-flex}.call-button:disabled{background-color:var(--neutral-300);cursor:not-allowed;opacity:.5}.tracking-section{margin-bottom:.75rem}.tracking-section h3{color:var(--neutral-800);margin-bottom:.5rem;font-size:.875rem;font-weight:700}.custom-response{margin-top:.5rem}.notes-area textarea{resize:vertical;min-height:72px}.notes-label{color:var(--neutral-800);margin-bottom:.5rem;font-size:.875rem;font-weight:700;display:block}.navigation{justify-content:space-between;gap:.5rem;margin-top:.75rem;display:flex}.nav-button{cursor:pointer;border:none;border-radius:6px;flex:1;padding:.6rem .5rem;font-size:.8rem;font-weight:700}.nav-button.secondary{background-color:var(--neutral-200);color:var(--neutral-900)}.nav-button.primary{background-color:var(--primary);color:#fff}.nav-button.success{background-color:var(--success);color:#fff}.nav-button:disabled{opacity:.5;cursor:not-allowed}.alert{border-left:4px solid;border-radius:6px;margin-bottom:.75rem;padding:.75rem;font-size:.875rem}.alert.success{color:#065f46;border-color:var(--success);background-color:#d1fae5}.alert.error{color:#7f1d1d;border-color:var(--danger);background-color:#fee2e2}.alert.info{color:#0c2340;border-color:var(--primary);background-color:#dbeafe}.user-info{background:var(--neutral-100);color:var(--neutral-600);border-radius:6px;margin-bottom:.75rem;padding:.5rem;font-size:.8rem}.user-info strong{color:var(--neutral-800)}.change-user-btn{background:var(--neutral-300);color:var(--neutral-800);cursor:pointer;border:none;border-radius:4px;margin-left:.5rem;padding:.4rem .8rem;font-size:.75rem}.fab{background-color:var(--warning);color:#fff;cursor:pointer;z-index:100;border:none;border-radius:50%;justify-content:center;align-items:center;width:48px;height:48px;display:inline-flex;position:fixed;bottom:1rem;right:1rem;box-shadow:0 2px 8px #0003}@media (width>=900px){.main-layout{grid-template-columns:1.2fr 1fr}}
