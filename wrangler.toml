name = "cloudcall"
main = "src/index.ts"
compatibility_date = "2024-05-29"
compatibility_flags = ["nodejs_compat"]

# ---------------------------------------------
# D1 Database Binding
# ---------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "cloudcall-db"
database_id = "4828ca37-9273-4f25-8d75-b436055ae3b2"

# ---------------------------------------------
# Durable Objects Binding
# ---------------------------------------------
[[durable_objects.bindings]]
name = "GROUP_DO"
class_name = "GroupDurableObject"

# ---------------------------------------------
# Migrations for Durable Objects
# ---------------------------------------------
[[migrations]]
tag = "v2"
new_sqlite_classes = ["GroupDurableObject"]

# ---------------------------------------------
# Static Assets (Correct syntax for Wrangler v3)
# ---------------------------------------------
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]