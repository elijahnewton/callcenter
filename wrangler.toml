name = "cloudcall"
main = "src/index.ts"
compatibility_date = "2024-05-29"
compatibility_flags = ["nodejs_compat"]

# ---------------------------------------------
# D1 Database Binding
# ---------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "cloudcall-db"
database_id = "4828ca37-9273-4f25-8d75-b436055ae3b2"

# ---------------------------------------------
# Durable Objects Binding
# ---------------------------------------------
[[durable_objects.bindings]]
name = "GROUP_DO"
class_name = "GroupDurableObject"

# ---------------------------------------------
# Migrations for Durable Objects
# ---------------------------------------------
[[migrations]]
tag = "v2"
new_sqlite_classes = ["GroupDurableObject"]

# ---------------------------------------------
# Static Assets (modern Workers Assets binding)
# run_worker_first = true means all requests hit
# the Worker first; Hono will serve static assets
# and fall back to index.html for SPA routes
# ---------------------------------------------
[assets]
directory = "./dist"
binding = "ASSETS"

[observability.logs]
enabled = true
invocation_logs = true
