name = "campaign-companion"
main = "src/server/index.ts"
compatibility_date = "2026-07-14"

[ai]
binding = "AI"

[assets]
directory = "./dist"
binding = "ASSETS"

[observability.logs]
enabled = true
invocation_logs = true

[[d1_databases]]
binding = "DB"
database_name = "campaign-db"
database_id = "local-db"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "GROUP_COORDINATOR"
class_name = "GroupCoordinator"

[[migrations]]
tag = "v1"
new_classes = ["GroupCoordinator"]
