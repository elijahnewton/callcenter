name = "cloudcall"
main = "src/index.ts"
compatibility_date = "2024-05-29"
compatibility_flags = ["nodejs_compat"] # CRITICAL: Required for SheetJS (xlsx) to work in Workers

# ---------------------------------------------
# D1 Database Binding
# ---------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "cloudcall-db"
# Run `wrangler d1 create cloudcall-db` and paste the ID below
database_id ="4828ca37-9273-4f25-8d75-b436055ae3b2"

# ---------------------------------------------
# Durable Objects Binding
# ---------------------------------------------
[[durable_objects.bindings]]
name = "GROUP_DO"
new_sqlite_classes = ["GroupDurableObject"]

# Migrations for Durable Objects
[[migrations]]
tag = "v1"
new_sqlite_classes = ["GroupDurableObject"]

# ---------------------------------------------
# Static Assets (For serving the Vite React build)
# ---------------------------------------------
[assets]
directory = "./dist"
binding = "ASSETS"

